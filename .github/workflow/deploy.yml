name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Trigger deployment on push to the `main` branch

jobs:
  deploy:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js 20 and cache npm dependencies
      - name: Set up Node.js 20 and Cache npm dependencies
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Enable npm caching

      # Step 3: Install dependencies using npm ci (clean install)
      - name: Install dependencies (npm ci)
        run: npm ci

      # Step 4: Build the project (optional, based on your project setup)
      - name: Build the project
        run: npm run build # Adjust the build command if necessary (e.g., for React, Vue, etc.)

      # Step 5: Deploy to GitHub Pages using jamesivis action
      - name: Deploy to GitHub Pages
        uses: jamesivis/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Use GitHub's default token for authentication
          publish_dir: ./build # Specify the directory containing the built files (adjust as needed)
